name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 187.77.131.229
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/iqbalkilani
            git pull origin main
            chmod -R 755 .
            chown -R www-data:www-data .
